services:
  backend:
    build:
      context: ./backend
    container_name: student-dao-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      TON_API_ENDPOINT: ${TON_API_ENDPOINT}
      TON_API_KEY: ${TON_API_KEY}
      SQLITE_PATH: ${SQLITE_PATH}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-12}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_CONTRACT_ADDRESS: ${VITE_CONTRACT_ADDRESS}
        VITE_TON_NETWORK: ${VITE_TON_NETWORK:-testnet}
        VITE_TONCONNECT_MANIFEST_URL: ${VITE_TONCONNECT_MANIFEST_URL}
    container_name: student-dao-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2.8.4-alpine
    container_name: student-dao-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  backend_data:
  caddy_data:
  caddy_config:
